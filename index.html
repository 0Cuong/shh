<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gửi Xnghi của ah ❤</title>
  <meta property="og:title" content="Gửi Xnghi của ah ❤">
  <meta property="og:description" content="Sth i need talk to you">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://raw.githubusercontent.com/sojijr/valentine-website/main/public/images/favicon.png">
  <link rel="icon" href="./public/images/favicon.png">
  <link rel="stylesheet" href="./public/style.css">
</head>

<body>
  <canvas id="starfield"></canvas>

  <audio id="myAudio" preload="auto">
    <source src="hi.mp3" type="audio/mpeg">
  </audio>

  <script src="./script.js" defer></script>

  <script>
    const audio = document.getElementById("myAudio");
    let musicStarted = false;
    let isFading = false;

    function playMusic() {
      if (musicStarted) return;
      audio.volume = 0.8;
      audio.play().then(() => {
        musicStarted = true;
        document.removeEventListener("touchstart", playMusic);
        document.removeEventListener("click", playMusic);
      }).catch(err => {});
    }

    audio.addEventListener("timeupdate", function() {
      if (audio.currentTime >= 72 && !isFading) {
        isFading = true;
        let vol = audio.volume;
        const fadeOut = setInterval(() => {
          if (vol > 0.05) {
            vol -= 0.05;
            audio.volume = vol;
          } else {
            clearInterval(fadeOut);
            audio.pause();
            audio.currentTime = 0;
          }
        }, 100);
      }
    });

    document.addEventListener("click", playMusic);
    document.addEventListener("touchstart", playMusic);
    document.addEventListener("scroll", playMusic, { once: true });
  </script>
</body>
</html>
