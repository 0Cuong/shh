<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gửi Xnghi của ah ❤</title>
  <meta property="og:title" content="Gửi Xnghi của ah ❤">
  <meta property="og:description" content="Sth i need talk to you">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://raw.githubusercontent.com/sojijr/valentine-website/main/public/images/favicon.png">
  <link rel="icon" href="./public/images/favicon.png">
  <link rel="stylesheet" href="./public/style.css">
  <script src="https://w.soundcloud.com/player/api.js"></script>
</head>

<body>
  <canvas id="starfield"></canvas>

  <iframe 
    id="scPlayer"
    style="position:fixed; top:0; left:0; width:1px; height:1px; border:0; opacity:0.01; pointer-events:none;"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/xxkingad/ascension&auto_play=false">
  </iframe>

  <script src="./script.js" defer></script>

  <script>
    const iframe = document.getElementById("scPlayer");
    const widget = SC.Widget(iframe);
    let musicStarted = false;

    function forcePlayMusic() {
      if (musicStarted) return;

      widget.setVolume(90);
      widget.play();
      
      widget.isPaused(function(paused) {
        if (!paused) {
          musicStarted = true;
          document.removeEventListener("touchstart", forcePlayMusic);
          document.removeEventListener("click", forcePlayMusic);
          document.removeEventListener("mousedown", forcePlayMusic);
        } else {
          setTimeout(forcePlayMusic, 150);
        }
      });
    }

    document.addEventListener("touchstart", forcePlayMusic, { passive: false });
    document.addEventListener("click", forcePlayMusic);
    document.addEventListener("mousedown", forcePlayMusic);
    document.addEventListener("scroll", forcePlayMusic, { once: true });

    widget.bind(SC.Widget.Events.FINISH, () => {
      widget.seekTo(0);
      widget.play();
    });
  </script>
</body>
</html>
